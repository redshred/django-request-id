[tool.uv.workspace]
members = ["django-request-id", "django-keycloak"]

[tool.uv]
package = false

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-django>=4.9",
    "pytest-asyncio>=0.24",
    "ruff>=0.6",
    "aioresponses>=0.7.6",
]

[tool.ruff]
line-length = 119
target-version = "py312"
extend-exclude = ["docs"]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "UP",
    "B",
    "SIM",
    "ASYNC",
    "DJ",
]
ignore = ["E402"]

[tool.ruff.lint.per-file-ignores]
"**/tests/*" = ["E501"]
